services:
  dumbpad:
    build: .
    container_name: dumbpad
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    volumes:
      - ${DATA_DIR:-./data}:/app/data
    env_file:
      - .env
    environment:
      # Override data dir inside container to match the mounted volume
      - DATA_DIR=/app/data
