<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#f1f2f4">
    <title>DumbPad</title>
    <link rel="icon" type="image/png" href="Assets/dumbpad-512.png">
    <link rel="apple-touch-icon" href="Assets/dumbpad-192.png">
    <link rel="stylesheet" href="Assets/login.css">
    <script>
        (() => {
            const stored = localStorage.getItem('dumbpad_theme');
            const theme = stored ? JSON.parse(stored) : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
</head>
<body class="dumbpad-login-body">
    <main class="dumbpad-login-shell">
        <section class="dumbpad-login-stage">
            <aside class="dumbpad-login-story" aria-hidden="true">
                <img src="Assets/dumbpad-512.png" alt="" class="dumbpad-login-story-icon">
                <p class="dumbpad-login-eyebrow">写下，连接，继续</p>
                <h1>让安全留在背景里</h1>
                <p>打开草稿本，继续上一次没有写完的想法。同步与备份会安静地完成。</p>
                <div class="dumbpad-login-signals"><span>本地优先</span><span>自动保存</span><span>可信设备</span></div>
            </aside>
            <section class="dumbpad-login-panel" aria-live="polite">
                <div id="login-content" class="dumbpad-login-content"></div>
            </section>
        </section>
        <p class="dumbpad-login-footer">DumbPad · 私人草稿本</p>
    </main>
    <script>
        (() => {
            const content = document.getElementById('login-content');
            let status = null;
            let setup = null;
            let recovery = null;

            function redirectTarget() {
                const value = new URLSearchParams(window.location.search).get('redirect') || '/';
                return value.startsWith('/') && !value.startsWith('//') && !value.includes('\\') ? value : '/';
            }

            function deviceLabel() {
                return [navigator.platform, navigator.userAgent.includes('Mobile') ? 'mobile' : 'browser'].filter(Boolean).join(' · ').slice(0, 100);
            }

            function escapeHtml(value) {
                const element = document.createElement('div');
                element.textContent = String(value || '');
                return element.innerHTML;
            }

            async function request(url, options = {}) {
                const response = await fetch(url, {
                    ...options,
                    headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
                    credentials: 'same-origin'
                });
                const body = await response.json().catch(() => ({}));
                if (!response.ok) {
                    const error = new Error(body.error || '请求失败');
                    error.code = body.code;
                    throw error;
                }
                return body;
            }

            function renderError(message) {
                const error = content.querySelector('[data-login-error]');
                if (error) error.textContent = message || '';
            }

            function renderLegacy() {
                content.innerHTML = `
                    <h2>输入 PIN</h2>
                    <p class="dumbpad-login-lead">继续进入草稿本。</p>
                    <form id="legacy-login-form" class="dumbpad-login-form">
                        <label for="legacy-pin">PIN</label>
                        <input id="legacy-pin" name="pin" inputmode="numeric" autocomplete="current-password" pattern="[0-9]*" maxlength="10" required autofocus placeholder="输入 PIN">
                        <button type="submit">进入 ${escapeHtml(status.siteTitle || 'DumbPad')}</button>
                    </form>
                    <p class="dumbpad-login-error" data-login-error role="alert"></p>`;
                content.querySelector('form').addEventListener('submit', async event => {
                    event.preventDefault();
                    renderError('');
                    const pin = content.querySelector('#legacy-pin').value;
                    try {
                        await request('/api/verify-pin', { method: 'POST', body: JSON.stringify({ pin }) });
                        window.location.assign(redirectTarget());
                    } catch (error) {
                        content.querySelector('#legacy-pin').value = '';
                        renderError(error.message);
                    }
                });
            }

            function renderV2Login({ requireTotp = false } = {}) {
                content.innerHTML = `
                    <p class="dumbpad-login-kicker">你的私人工作台</p>
                    <h2>欢迎回来</h2>
                    <p class="dumbpad-login-lead">输入主密码即可继续。新设备才需要验证码。</p>
                    <form id="v2-login-form" class="dumbpad-login-form">
                        <label for="login-password">主密码</label>
                        <input id="login-password" name="password" type="password" autocomplete="current-password" required autofocus placeholder="输入主密码">
                        <div class="dumbpad-login-totp ${requireTotp ? 'is-visible' : ''}">
                            <label for="login-totp">验证码</label>
                            <input id="login-totp" name="totp" inputmode="numeric" autocomplete="one-time-code" pattern="[0-9]{6}" maxlength="6" placeholder="6 位验证码">
                            <p>这是新设备。请打开验证器输入当前验证码。</p>
                        </div>
                        <button type="submit">进入 ${escapeHtml(status.siteTitle || 'DumbPad')}</button>
                    </form>
                    <p class="dumbpad-login-trust"><span>✓</span>这台设备受信任后，日常使用不会被额外验证打断。</p>
                    <button id="start-recovery" type="button" class="dumbpad-login-secondary dumbpad-login-text-action">验证器不可用？</button>
                    <p class="dumbpad-login-error" data-login-error role="alert"></p>`;
                document.getElementById('start-recovery').addEventListener('click', renderRecoveryStart);
                content.querySelector('form').addEventListener('submit', async event => {
                    event.preventDefault();
                    renderError('');
                    const password = content.querySelector('#login-password').value;
                    const totpCode = content.querySelector('#login-totp')?.value || '';
                    try {
                        await request('/api/auth/login', {
                            method: 'POST',
                            body: JSON.stringify({ password, totpCode, trustDevice: true, deviceLabel: deviceLabel() })
                        });
                        window.location.assign(redirectTarget());
                    } catch (error) {
                        if (error.code === 'TOTP_REQUIRED' && !requireTotp) return renderV2Login({ requireTotp: true });
                        renderError(error.message);
                    }
                });
            }

            function renderRecoveryStart() {
                content.innerHTML = `
                    <p class="dumbpad-login-kicker">恢复访问</p>
                    <h2>重新绑定验证器</h2>
                    <p class="dumbpad-login-lead">使用一枚恢复码即可替换旧验证器。该恢复码会随即失效。</p>
                    <form id="recovery-start-form" class="dumbpad-login-form">
                        <label for="recovery-password">主密码</label>
                        <input id="recovery-password" type="password" autocomplete="current-password" required placeholder="输入主密码">
                        <label for="recovery-code">恢复码</label>
                        <input id="recovery-code" autocomplete="one-time-code" required placeholder="例如 A1B2C3D4-E5F6A7B8">
                        <button type="submit">继续恢复</button>
                    </form>
                    <button id="back-to-login" type="button" class="dumbpad-login-secondary dumbpad-login-text-action">返回登录</button>
                    <p class="dumbpad-login-error" data-login-error role="alert"></p>`;
                document.getElementById('back-to-login').addEventListener('click', () => renderV2Login());
                content.querySelector('form').addEventListener('submit', async event => {
                    event.preventDefault();
                    renderError('');
                    try {
                        recovery = await request('/api/auth/recovery/start', {
                            method: 'POST',
                            body: JSON.stringify({
                                password: content.querySelector('#recovery-password').value,
                                recoveryCode: content.querySelector('#recovery-code').value,
                                deviceLabel: deviceLabel()
                            })
                        });
                        renderRecoveryTotp();
                    } catch (error) {
                        renderError(error.message);
                    }
                });
            }

            function renderRecoveryTotp() {
                content.innerHTML = `
                    <p class="dumbpad-login-kicker">恢复访问 · 最后一步</p>
                    <h2>确认新验证器</h2>
                    <p class="dumbpad-login-lead">将新密钥添加到验证器，再输入当前验证码。</p>
                    <div class="dumbpad-login-secret"><code>${escapeHtml(recovery.totpSecret)}</code><button id="copy-recovery-secret" type="button" class="dumbpad-login-secondary">复制</button></div>
                    <form id="recovery-confirm-form" class="dumbpad-login-form">
                        <label for="recovery-totp">6 位验证码</label>
                        <input id="recovery-totp" inputmode="numeric" autocomplete="one-time-code" pattern="[0-9]{6}" maxlength="6" required autofocus placeholder="6 位验证码">
                        <button type="submit">完成恢复</button>
                    </form>
                    <p class="dumbpad-login-error" data-login-error role="alert"></p>`;
                document.getElementById('copy-recovery-secret').addEventListener('click', () => {
                    navigator.clipboard?.writeText(recovery.totpSecret).then(() => renderError('密钥已复制。')).catch(() => renderError('请手动复制显示的密钥。'));
                });
                content.querySelector('form').addEventListener('submit', async event => {
                    event.preventDefault();
                    renderError('');
                    try {
                        await request('/api/auth/recovery/confirm', {
                            method: 'POST',
                            body: JSON.stringify({ recoveryId: recovery.recoveryId, totpCode: content.querySelector('#recovery-totp').value })
                        });
                        window.location.assign(redirectTarget());
                    } catch (error) {
                        renderError(error.message);
                    }
                });
            }

            function renderSetupStart() {
                content.innerHTML = `
                    <p class="dumbpad-login-kicker">首次安全设置 · 1 / 3</p>
                    <h2>为草稿本设置一把钥匙</h2>
                    <p class="dumbpad-login-lead">这只需要完成一次。之后日常打开不会增加步骤。</p>
                    <form id="setup-start-form" class="dumbpad-login-form">
                        <label for="setup-pin">原 PIN</label>
                        <input id="setup-pin" name="legacyPin" inputmode="numeric" autocomplete="current-password" required placeholder="用于完成迁移">
                        <label for="setup-password">新主密码</label>
                        <input id="setup-password" name="password" type="password" autocomplete="new-password" minlength="12" required placeholder="至少 12 个字符">
                        <button type="submit">继续设置</button>
                    </form>
                    <p class="dumbpad-login-error" data-login-error role="alert"></p>`;
                content.querySelector('form').addEventListener('submit', async event => {
                    event.preventDefault();
                    renderError('');
                    try {
                        setup = await request('/api/auth/setup/start', {
                            method: 'POST',
                            body: JSON.stringify({
                                legacyPin: content.querySelector('#setup-pin').value,
                                password: content.querySelector('#setup-password').value,
                                deviceLabel: deviceLabel()
                            })
                        });
                        renderSetupTotp();
                    } catch (error) {
                        renderError(error.message);
                    }
                });
            }

            function copySetupSecret() {
                navigator.clipboard?.writeText(setup.totpSecret).then(() => renderError('密钥已复制，请添加到验证器。')).catch(() => renderError('请手动复制显示的密钥。'));
            }

            function renderSetupTotp() {
                content.innerHTML = `
                    <p class="dumbpad-login-kicker">首次安全设置 · 2 / 3</p>
                    <h2>添加验证器</h2>
                    <p class="dumbpad-login-lead">把下面密钥添加到常用验证器。它只会在新设备和高危操作时出现。</p>
                    <div class="dumbpad-login-secret"><code>${escapeHtml(setup.totpSecret)}</code><button id="copy-secret" type="button" class="dumbpad-login-secondary">复制</button></div>
                    <form id="setup-confirm-form" class="dumbpad-login-form">
                        <label for="setup-totp">验证器当前显示的 6 位验证码</label>
                        <input id="setup-totp" inputmode="numeric" autocomplete="one-time-code" pattern="[0-9]{6}" maxlength="6" required autofocus placeholder="6 位验证码">
                        <button type="submit">确认并继续</button>
                    </form>
                    <p class="dumbpad-login-error" data-login-error role="alert"></p>`;
                document.getElementById('copy-secret').addEventListener('click', copySetupSecret);
                content.querySelector('form').addEventListener('submit', async event => {
                    event.preventDefault();
                    renderError('');
                    try {
                        const result = await request('/api/auth/setup/confirm', {
                            method: 'POST',
                            body: JSON.stringify({ setupId: setup.setupId, totpCode: content.querySelector('#setup-totp').value })
                        });
                        renderRecoveryCodes(result.recoveryCodes);
                    } catch (error) {
                        renderError(error.message);
                    }
                });
            }

            function renderRecoveryCodes(codes) {
                content.innerHTML = `
                    <p class="dumbpad-login-kicker">首次安全设置 · 3 / 3</p>
                    <h2>保存恢复码</h2>
                    <p class="dumbpad-login-lead">验证器不可用时，恢复码是唯一备用入口。请保存到密码管理器。</p>
                    <div class="dumbpad-login-recovery">${codes.map(code => `<code>${escapeHtml(code)}</code>`).join('')}</div>
                    <button id="download-recovery" type="button" class="dumbpad-login-secondary">下载恢复码</button>
                    <button id="finish-setup" type="button">我已安全保存，进入 DumbPad</button>`;
                document.getElementById('download-recovery').addEventListener('click', () => {
                    const blob = new Blob([`DumbPad 恢复码\n\n${codes.join('\n')}\n`], { type: 'text/plain;charset=utf-8' });
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(blob);
                    link.download = 'dumbpad-recovery-codes.txt';
                    link.click();
                    URL.revokeObjectURL(link.href);
                });
                document.getElementById('finish-setup').addEventListener('click', () => window.location.assign(redirectTarget()));
            }

            async function initialize() {
                try {
                    status = await request('/api/auth/status');
                    document.title = `${status.siteTitle || 'DumbPad'} · 登录`;
                    if (status.mode === 'setup') return renderSetupStart();
                    if (status.mode === 'login') return renderV2Login();
                    return renderLegacy();
                } catch (error) {
                    content.innerHTML = `<h2>暂时无法登录</h2><p class="dumbpad-login-lead">${escapeHtml(error.message)}</p>`;
                }
            }

            initialize();
        })();
    </script>
</body>
</html>
